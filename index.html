<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lagartixa Caminhões</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:#fff;
}

header {
  background:#000;
  padding:20px;
  text-align:center;
  border-bottom:2px solid #00ff88;
}

header h1 {
  margin:0;
  color:#00ff88;
}

.container {
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
}

.card {
  background:#1c1c1c;
  border-radius:10px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.03);
}

.card img {
  width:100%;
  height:200px;
  object-fit:cover;
}

.info {
  padding:15px;
}

.price {
  color:#00ff88;
  font-size:20px;
  margin:10px 0;
}

.btn {
  display:block;
  text-align:center;
  background:#25D366;
  padding:12px;
  color:#fff;
  text-decoration:none;
  border-radius:5px;
}
</style>

</head>

<body>

<header>
  <h1>🚛 LAGARTIXA CAMINHÕES</h1>
  <p>Qualidade e procedência garantida</p>
</header>

<div class="container">

  <!-- CAMINHÃO 1 -->
  <div class="card">
    <img src="https://raw.githubusercontent.com/vitoraugusto0224-bot/lagartixacaminhoes/refs/heads/main/55f83eb5-52af-44de-818d-dfd5ca833dee.jpeg">
    <div class="info">
      <h3>VW 17.230 2018</h3>
      <div class="price">R$ 395.000</div>
      <p>Munck 16t • Módulo passageiro • 89.000 km • 6 pneus novos</p>
      <a class="btn" href="https://wa.me/5531973279799">Chamar no WhatsApp</a>
    </div>
  </div>

  <!-- CAMINHÃO 2 -->
  <div class="card">
    <img src="https://raw.githubusercontent.com/vitoraugusto0224-bot/lagartixacaminhoes/refs/heads/main/91c68cc7-c4a0-4aba-952f-3279b6a9d1d4.jpeg">
    <div class="info">
      <h3>VW 24.280 2014</h3>
      <div class="price">R$ 245.000</div>
      <p>Trucado • Chassi • Muito forte e pronto pra trabalhar</p>
      <a class="btn" href="https://wa.me/5531973279799">Chamar no WhatsApp</a>
    </div>
  </div>

  <!-- RESTO DAS FOTOS COMO GALERIA -->
  
  <div class="card"><img src="https://raw.githubusercontent.com/vitoraugusto0224-bot/lagartixacaminhoes/refs/heads/main/aac156f0-b83d-45ec-9528-92c4b8f78d7c.jpeg"></div>
  <div class="card"><img src="https://raw.githubusercontent.com/vitoraugusto0224-bot/lagartixacaminhoes/refs/heads/main/ae9c4c77-b475-4bf3-9f64-b3c956738597.jpeg"></div>
  <div class="card"><img src="https://raw.githubusercontent.com/vitoraugusto0224-bot/lagartixacaminhoes/refs/heads/main/b93d2b9b-88c7-40e4-aa2e-bc8182920af5.jpeg"></div>
  <div class="card"><img src="https://raw.githubusercontent.com/vitoraugusto0224-bot/lagartixacaminhoes/refs/heads/main/d89fe979-b2a6-4941-86d3-6e9598a0d009.jpeg"></div>
  <div class="card"><img src="https://raw.githubusercontent.com/vitoraugusto0224-bot/lagartixacaminhoes/refs/heads/main/de2e1e25-a3a8-47d6-9c7f-bc4c00e429ef.jpeg"></div>
  <div class="card"><img src="https://raw.githubusercontent.com/vitoraugusto0224-bot/lagartixacaminhoes/refs/heads/main/fdd94089-3bf3-4199-ba7d-5aa6ebcdeaa1.jpeg"></div>

</div>

</body>
</html>
